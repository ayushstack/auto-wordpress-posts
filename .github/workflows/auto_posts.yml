# ============================================================
# GitHub Actions — Auto WordPress Post Creator v15
# Runs every day at 10:00 AM IST (India Standard Time)
# IST = UTC + 5:30  →  10:00 AM IST = 04:30 UTC
# ============================================================

name: Auto WordPress Posts

on:
  schedule:
    - cron: "30 4 * * *"   # 04:30 UTC = 10:00 AM IST every day

  # Also allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      posts:
        description: "Number of posts to create"
        required: false
        default: "10"
      dry_run:
        description: "Dry run? (true/false)"
        required: false
        default: "false"

jobs:
  run-auto-posts:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # script creates all posts instantly (scheduled via WP), so 30 min is enough

    steps:
      # ── 1. Checkout your repo ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ────────────────────────────
      - name: Install dependencies
        run: |
          pip install requests google-auth pytz

      # ── 4. Write service_account.json from GitHub Secret ──
      - name: Write service_account.json
        run: |
          echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service_account.json

      # ── 5. Restore used_keywords.txt from cache ────────────
      - name: Restore used keywords cache
        uses: actions/cache@v4
        with:
          path: used_keywords.txt
          key: used-keywords-${{ github.run_id }}
          restore-keys: |
            used-keywords-

      # ── 6. Run the script ──────────────────────────────────
      - name: Run auto_posts.py
        env:
          WP_USERNAME:         ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:     ${{ secrets.WP_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          POSTS="${{ github.event.inputs.posts || '10' }}"
          DRY="${{ github.event.inputs.dry_run || 'false' }}"

          if [ "$DRY" = "true" ]; then
            python auto_posts.py --posts "$POSTS" --dry-run
          else
            python auto_posts.py --posts "$POSTS"
          fi

      # ── 7. Save logs as artifact ───────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-posts-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30

      # ── 8. Commit updated used_keywords.txt back to repo ───
      - name: Commit used_keywords.txt
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_keywords.txt || true
          git diff --cached --quiet || git commit -m "chore: update used_keywords.txt [skip ci]"
          git push